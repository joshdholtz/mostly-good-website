<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mostly Good, LLC</title>
  <meta name="description" content="Mostly Good, LLC — making things we wish existed.">
  <link rel="canonical" href="https://mostlygood.dev">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>~</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #e8e8ef;
      --muted: #7a7a8e;
      --accent: #8b5cf6;
      --accent2: #06b6d4;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.06);
      --card-hover: rgba(255, 255, 255, 0.08);
      --glow: rgba(139, 92, 246, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background:
        radial-gradient(ellipse 600px 600px at 20% 30%, rgba(139, 92, 246, 0.08), transparent),
        radial-gradient(ellipse 500px 500px at 80% 70%, rgba(6, 182, 212, 0.06), transparent),
        radial-gradient(ellipse 400px 400px at 50% 50%, rgba(139, 92, 246, 0.04), transparent);
      animation: drift 20s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(30px, -20px) rotate(3deg); }
    }

    /* Dot grid */
    .bg-dots {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    /* Logo */
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      position: relative;
      display: inline-block;
    }

    .logo .mostly {
      color: var(--fg);
    }

    .logo .good {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo .dot {
      color: var(--accent);
      -webkit-text-fill-color: var(--accent);
    }

    .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 3.5rem;
      font-weight: 400;
    }

    /* Section label */
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--card-border), transparent);
    }

    /* Product cards */
    .products {
      display: grid;
      gap: 1rem;
      margin-bottom: 3.5rem;
    }

    .product {
      position: relative;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem 1.75rem;
      background: var(--card-bg);
      text-decoration: none;
      color: var(--fg);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .product::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--glow), transparent 40%);
      transition: opacity 0.3s;
    }

    .product:hover::before {
      opacity: 1;
    }

    .product:hover {
      border-color: rgba(139, 92, 246, 0.2);
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    .product-info {
      position: relative;
      z-index: 1;
    }

    .product-name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .product-icon {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .product-icon.metrics {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    }

    .product-icon.cooked {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
    }

    .product-desc {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .product-arrow {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 1.2rem;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .product:hover .product-arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    /* Footer */
    .footer {
      margin-top: 3.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .footer a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1px;
    }

    .footer a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .logo { font-size: 1.8rem; }
      .tagline { font-size: 1rem; }
      .product { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-dots"></div>

  <div class="page">
    <div class="container">
      <div class="logo">
        <span class="mostly">mostly</span><span class="good">good</span><span class="dot">.</span>
      </div>
      <p class="tagline">Making things we wish existed.</p>

      <div class="section-label">Products</div>
      <div class="products">
        <a class="product" href="https://mostlygoodmetrics.com" target="_blank" rel="noopener">
          <div class="product-info">
            <div class="product-name">
              <span class="product-icon metrics">M</span>
              Mostly Good Metrics
            </div>
            <div class="product-desc">Analytics and metrics tooling.</div>
          </div>
          <span class="product-arrow">&rarr;</span>
        </a>
        <a class="product" href="https://cookedbooks.ai" target="_blank" rel="noopener">
          <div class="product-info">
            <div class="product-name">
              <span class="product-icon cooked">C</span>
              Cooked Books
            </div>
            <div class="product-desc">AI-powered tools for finance.</div>
          </div>
          <span class="product-arrow">&rarr;</span>
        </a>
      </div>

      <div class="footer">
        <span>&copy; 2026 Mostly Good &middot; Chicagoland</span>
        <a href="mailto:hello@mostlygood.dev">hello@mostlygood.dev</a>
      </div>
    </div>
  </div>

  <script>
    // Card glow follows mouse
    document.querySelectorAll('.product').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
        card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
      });
    });
  </script>
</body>
</html>
